<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ota // install</title>
<style>
  :root{
    --bg:#0a0e14;
    --panel:#10151b;
    --line:rgba(79,209,255,.16);
    --cyan:#4fd1ff;
    --violet:#b478ff;
    --ok:#56d364;
    --dim:#5b6672;
    --text:#dce3ea;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at 50% 0%, #121a24 0%, var(--bg) 60%);
    color:var(--text);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    padding:24px;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.025) 0px,
      rgba(255,255,255,.025) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
    mix-blend-mode:overlay;
  }
  .wrap{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .term{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,.4),
      0 20px 60px -20px rgba(79,209,255,.15),
      inset 0 1px 0 rgba(255,255,255,.03);
    overflow:hidden;
  }
  .term__bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    background:rgba(255,255,255,.02);
    border-bottom:1px solid var(--line);
  }
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;opacity:.7;}
  .dot--r{background:#ff5f56;}
  .dot--y{background:#ffbd2e;}
  .dot--g{background:#27c93f;}
  .term__title{
    margin-left:6px;
    font-size:12px;
    color:var(--dim);
    letter-spacing:.02em;
  }
  .term__body{
    padding:20px 18px 24px;
    min-height:180px;
  }
  .boot{
    margin:0 0 4px;
    font-size:13px;
    line-height:1.9;
    color:var(--text);
    white-space:pre-wrap;
  }
  .boot .ok{color:var(--ok);}
  .boot .prompt{color:var(--cyan);}
  .cursor{
    display:inline-block;
    width:7px;height:14px;
    background:var(--cyan);
    vertical-align:middle;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}
  .meta{
    display:flex;
    gap:10px;
    align-items:baseline;
    margin:14px 0 18px;
    font-size:12px;
  }
  .meta__label{color:var(--dim);}
  .meta__val{color:var(--violet);}
  .install{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:14px 0;
    border-radius:9px;
    text-decoration:none;
    font-weight:600;
    font-size:15px;
    letter-spacing:.01em;
    color:#04141c;
    background:linear-gradient(180deg, var(--cyan), #1fb3e6);
    box-shadow:0 8px 24px -8px rgba(79,209,255,.55);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .install:active{transform:scale(.98);}
  .hint{
    text-align:center;
    font-family:-apple-system, system-ui, sans-serif;
    font-size:12.5px;
    color:var(--dim);
    margin:0;
  }
  [hidden]{display:none !important;}
  @media (prefers-reduced-motion: reduce){
    .cursor{animation:none;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="term">
      <div class="term__bar">
        <span class="dot dot--r"></span><span class="dot dot--y"></span><span class="dot dot--g"></span>
        <span class="term__title">ota — zsh</span>
      </div>
      <div class="term__body">
        <pre class="boot" id="boot"></pre>
        <div class="meta" id="meta" hidden>
          <span class="meta__label">build</span><span class="meta__val" id="ver">—</span>
        </div>
        <a class="install" id="install" href="#" hidden>▸ Установить</a>
      </div>
    </div>
    <p class="hint">Открой ссылку в Safari на самом устройстве, без VPN</p>
  </div>

<script>
  const BASE_URL = "https://ota.nyxsile.lol";

  const bootEl = document.getElementById('boot');
  const metaEl = document.getElementById('meta');
  const verEl  = document.getElementById('ver');
  const btn    = document.getElementById('install');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  function buildInstallHref(){
    const manifest = `${BASE_URL}/manifest.plist?v=${Date.now()}`;
    return `itms-services://?action=download-manifest&url=${encodeURIComponent(manifest)}`;
  }

  function reveal(version){
    metaEl.hidden = false;
    verEl.textContent = version || 'unknown';
    btn.href = buildInstallHref();
    btn.hidden = false;
  }

  async function getVersion(){
    try{
      const res = await fetch(`${BASE_URL}/version.json?v=${Date.now()}`, {cache:'no-store'});
      const data = await res.json();
      return data.version;
    }catch(e){
      return null;
    }
  }

  async function boot(){
    const lines = [
      {t:'$ verify signing certificate', c:'prompt'},
      {t:'  ✓ ok', c:'ok'},
      {t:'$ fetch latest build', c:'prompt'},
    ];
    const version = await getVersion();
    lines.push({t: version ? `  ✓ ${version} ready` : '  ✓ ready', c:'ok'});

    if(reduced){
      bootEl.textContent = lines.map(l=>l.t).join('\n');
      reveal(version);
      return;
    }

    for(const line of lines){
      const span = document.createElement('span');
      span.className = line.c;
      bootEl.appendChild(span);
      for(const ch of line.t){
        span.textContent += ch;
        await new Promise(r=>setTimeout(r, 14));
      }
      bootEl.appendChild(document.createTextNode('\n'));
      await new Promise(r=>setTimeout(r, 120));
    }
    const cur = document.createElement('span');
    cur.className = 'cursor';
    bootEl.appendChild(cur);
    reveal(version);
  }

  boot();
</script>
</body>
</html>
